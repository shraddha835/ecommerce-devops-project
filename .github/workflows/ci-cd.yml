name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────────
  # 1. Test Frontend
  # ─────────────────────────────────────────────
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Build
      run: npm run build

  # ─────────────────────────────────────────────
  # 2. Test Backend Services
  # ─────────────────────────────────────────────
  test-backend:
    name: Test ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, product-service, eureka-server]

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build & test ${{ matrix.service }}
      run: mvn -f backend/${{ matrix.service }}/pom.xml clean package

  # ─────────────────────────────────────────────
  # 3. Build & Push Docker Images  (main branch only)
  # ─────────────────────────────────────────────
  build-and-push:
    name: Build & Push ${{ matrix.service }}
    needs: [test-frontend, test-backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
          - service: user-service
            context: ./backend/user-service
          - service: product-service
            context: ./backend/product-service
          - service: eureka-server
            context: ./backend/eureka-server

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.service }}
        tags: |
          type=sha,prefix=main-
          type=raw,value=latest,enable=true

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: ${{ matrix.context }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # 4. Deploy to Kubernetes  (main branch only)
  # ─────────────────────────────────────────────
  deploy-to-k8s:
    name: Deploy to Kubernetes
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Configure kubectl
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.KUBE_CONFIG }}

    - name: Update image tags in manifests
      run: |
        SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
        sed -i "s|image:.*user-service.*|image: ${{ secrets.DOCKER_USERNAME }}/user-service:main-${SHORT_SHA}|g" devops/kubernetes/user-service.yaml
        sed -i "s|image:.*product-service.*|image: ${{ secrets.DOCKER_USERNAME }}/product-service:main-${SHORT_SHA}|g" devops/kubernetes/product-service.yaml
        sed -i "s|image:.*frontend.*|image: ${{ secrets.DOCKER_USERNAME }}/frontend:main-${SHORT_SHA}|g" devops/kubernetes/frontend.yaml

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f devops/kubernetes/namespace.yaml
        kubectl apply -f devops/kubernetes/configmap-secret.yaml
        kubectl apply -f devops/kubernetes/databases.yaml
        kubectl apply -f devops/kubernetes/eureka-server.yaml
        kubectl apply -f devops/kubernetes/user-service.yaml
        kubectl apply -f devops/kubernetes/product-service.yaml
        kubectl apply -f devops/kubernetes/frontend.yaml

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/user-service -n ecommerce --timeout=120s
        kubectl rollout status deployment/product-service -n ecommerce --timeout=120s
        kubectl rollout status deployment/frontend -n ecommerce --timeout=120s
        kubectl get pods -n ecommerce
