# Docker Compose for Development with Hot Reload

version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: userdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:7
    container_name: ecommerce-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis-dev
    ports:
      - "6379:6379"

volumes:
  postgres_dev_data:
  mongo_dev_data:
