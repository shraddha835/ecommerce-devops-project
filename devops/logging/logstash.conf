# Logstash configuration for centralized logging

input {
  # Beats input (for Filebeat)
  beats {
    port => 5044
  }

  # TCP input for application logs
  tcp {
    port => 5000
    codec => json
  }

  # HTTP input
  http {
    port => 8080
  }
}

filter {
  # Parse JSON logs
  if [message] =~ /^\{.*\}$/ {
    json {
      source => "message"
    }
  }

  # Add fields
  mutate {
    add_field => {
      "environment" => "production"
    }
  }

  # Parse Spring Boot logs
  if [application] == "user-service" or [application] == "product-service" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{NUMBER:pid} --- \[%{DATA:thread}\] %{DATA:class} : %{GREEDYDATA:log_message}"
      }
    }
  }

  # Parse Next.js logs
  if [application] == "frontend" {
    grok {
      match => {
        "message" => "%{TIMESTAMP_ISO8601:timestamp} %{LOGLEVEL:log_level} %{GREEDYDATA:log_message}"
      }
    }
  }

  # Remove unnecessary fields
  mutate {
    remove_field => ["host", "agent", "ecs"]
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "ecommerce-logs-%{+YYYY.MM.dd}"
    user => "elastic"
    password => "changeme"
  }

  # Output to stdout for debugging
  stdout {
    codec => rubydebug
  }
}
