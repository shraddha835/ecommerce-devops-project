apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: ecommerce
type: Opaque
data:
  postgres-password: cG9zdGdyZXM=  # base64 encoded "postgres"
  mongodb-password: bW9uZ29kYg==    # base64 encoded "mongodb"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: ecommerce
data:
  EUREKA_SERVER_URL: "http://eureka-server:8761/eureka/"
  POSTGRES_HOST: "postgres"
  MONGODB_HOST: "mongodb"
  REDIS_HOST: "redis"
